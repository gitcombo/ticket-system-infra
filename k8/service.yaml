apiVersion: v1
kind: Service
metadata:
  name: ticket-system-api
  namespace: ticket-system
  labels:
    app.kubernetes.io/name: ticket-system
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    # Must match the labels on the Deployment's pod template exactly.
    app.kubernetes.io/name: ticket-system
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
