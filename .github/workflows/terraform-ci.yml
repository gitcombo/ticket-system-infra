name: Terraform CI

on:
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Validate & Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Step 1 — Format check
      - name: Terraform Format Check
        run: terraform fmt --check -recursive
        working-directory: infra/

      # Step 2 — Init (no remote backend)
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra/

      # Step 3 — Validate
      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/

      # Step 4 — Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan.txt
        working-directory: infra/

      # Step 5 — Post plan as PR comment
      - name: Post Plan as PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [output truncated] ...'
              : plan;
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan — \`dev\`\n\n<details><summary>Click to expand</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`
            });
